name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular
      run: |
        npm run build
        echo "Build output:"
        ls -laR www/ 2>/dev/null || echo "www directory does not exist!"

    - name: Check www directory contents
      run: |
        if [ -d "www" ]; then
          echo "www directory exists"
          ls -la www/ | head -20
          echo "Total files in www:"
          find www -type f | wc -l
        else
          echo "ERROR: www directory not found!"
          exit 1
        fi

    - name: Copy to Capacitor
      run: npx capacitor copy

    - name: Build APK with Gradle
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
